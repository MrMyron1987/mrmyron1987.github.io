<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skogsordboken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ordbok.css">
</head>
<body>
<div class="app-container">
    <!-- ===================== HEADER ===================== -->
    <header class="main-header">
        <h1 data-translate="headerTitle"></h1>
        <!-- Till startsidan-knapp -->
        <button id="backToStartBtn" class="back-btn" data-translate="backBtn"></button>
    </header>

    <!-- ===================== INNEHÅLL ===================== -->
    <main class="tab-content-wrapper">
        <p class="news-intro" data-translate="introText"></p>
        <!-- Sökfält -->
        <div class="dictionary-search">
            <input type="text" id="dictSearch" data-translate-placeholder="searchPlaceholder">
        </div>
        <!-- Ordbokstabell -->
        <div class="dictionary-table-wrapper">
            <table class="dictionary-table" id="dictTable">
                <thead>
                    <tr>
                        <th><span data-translate="colFinnish"></span> <button class="sort-btn" data-col="fi">▲▼</button></th>
                        <th><span data-translate="colSwedish"></span> <button class="sort-btn" data-col="sv">▲▼</button></th>
                        <th><span data-translate="colEnglish"></span> <button class="sort-btn" data-col="en">▲▼</button></th>
                    </tr>
                </thead>
                <tbody id="dictBody"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>© Mats Lindholm</p>
    </footer>
</div>

<script src="ordbok.js"></script>
</body>
</html>
