<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skogsbrukstest – Välkommen</title>
    <link rel="stylesheet" href="Startsida.css">
</head>
<body>
<div class="app-container">
    <header class="main-header">
        <h1>🌲 Skogskunskap</h1>
        <div class="language-selector">
            <button class="lang-btn active" data-lang="sv">🇸🇪 Svenska</button>
            <button class="lang-btn" data-lang="fi">🇫🇮 Suomi</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
    </header>

    <main class="welcome-content">
        <div class="welcome-card">
            <h2 id="welcomeTitle">Hej och välkommen!</h2>
            <p id="welcomeText">
                Detta är en plats för skogsstuderande, skogsexperter och skogsägare 
                att testa sina kunskaper inom skogsbruk.
            </p>
            <button id="goToTestsBtn" class="primary-btn">🌿 Gå till testerna</button>
        </div>
    </main>

    <footer>
        <p>© Mats Lindholm</p>
    </footer>
</div>

<script src="startsida.js"></script>
</body>
</html>
