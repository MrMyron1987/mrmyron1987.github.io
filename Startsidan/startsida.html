<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finska skogssidan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Startsida.css">
</head>
<body>
<div class="app-container">
    <!-- ===================== HEADER ===================== -->
    <header class="main-header">
        <h1 data-translate="headerTitle"></h1>
        <div class="lang-bar">
            <button class="lang-btn" data-lang="sv">SV</button>
            <button class="lang-btn" data-lang="fi">FIN</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </header>

    <!-- ===================== FLIKMENY ===================== -->
    <nav class="tabs-nav">
        <button class="tab active" data-tab="start" data-translate="tabStart"></button>
        <button class="tab" data-tab="nyheter" data-translate="tabNyheter"></button>
        <button class="tab" data-tab="kunskapstester" data-translate="tabKunskapstester"></button>
        <button class="tab" data-tab="studiematerial" data-translate="tabStudiematerial"></button>
        <button class="tab" data-tab="jobb" data-translate="tabJobb"></button>
        <button class="tab" data-tab="blanketter" data-translate="tabBlanketter"></button>
        <button class="tab" data-tab="ordbok" data-translate="tabDictionary"></button>
    </nav>

    <!-- ===================== INNEHÅLLSPANELER ===================== -->
    <main class="tab-content-wrapper">
        <!-- ===== START ===== -->
        <div class="tab-panel active" id="panel-start">
            <p class="welcome-message" data-translate="welcomeMsg"></p>
            <div class="info-grid">
                <div class="info-card">
                    <h2 data-translate="infoBox1Title"></h2>
                    <p data-translate="infoBox1Text"></p>
                </div>
                <div class="info-card">
                    <h2 data-translate="infoBox2Title"></h2>
                    <p data-translate="infoBox2Text"></p>
                </div>
                <div class="info-card">
                    <h2 data-translate="infoBox3Title"></h2>
                    <p data-translate="infoBox3Text"></p>
                </div>
            </div>
        </div>

        <!-- ===== ORGANISATIONER ===== -->
        <div class="tab-panel" id="panel-nyheter">
            <p class="news-intro" data-translate="newsIntro"></p>
            <div class="news-container" id="newsContainer"></div>
        </div>

        <!-- ===== KUNSKAPSTESTER ===== -->
        <div class="tab-panel" id="panel-kunskapstester">
            <div class="test-intro">
                <p data-translate="testIntroText"></p>
                <div class="test-btn-wrapper">
                    <button id="goToTestsBtn" class="primary-btn" data-translate="goToTests"></button>
                </div>
            </div>
        </div>

        <!-- ===== STUDIEMATERIAL ===== -->
        <div class="tab-panel" id="panel-studiematerial">
            <p class="news-intro" data-translate="studiematerialIntro"></p>
            <div class="news-container" id="studyContainer"></div>
        </div>

        <!-- ===== BLANKETTER ===== -->
        <div class="tab-panel" id="panel-blanketter">
            <p class="news-intro" data-translate="blanketterIntro"></p>
            <div class="news-container" id="formContainer"></div>
        </div>

        <!-- ===== ORDBOKEN (knapp till separat sida) ===== -->
        <div class="tab-panel" id="panel-ordbok">
            <p class="news-intro" data-translate="dictionaryIntro"></p>
            <div class="dictionary-button-wrapper">
                <p data-translate="dictionaryClickText"></p>
                <button id="goToDictionaryBtn" class="primary-btn" data-translate="dictionaryButton"></button>
            </div>
        </div>
    </main>

    <footer>
        <p>© Mats Lindholm</p>
    </footer>
</div>

<script src="startsida.js"></script>
</body>
</html>
