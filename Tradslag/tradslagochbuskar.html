<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trädslag och buskar – Övning</title>
    <link rel="stylesheet" href="tradslagochbuskar.css">
</head>
<body>
<div class="app-container">
    <header class="main-header">
        <h1 id="pageTitle">🌳 Trädslag och buskar</h1>
        <button id="backToTestsBtn" class="back-btn">⬅ Tillbaka till testerna</button>
    </header>

    <main class="quiz-area">
        <!-- Introduktionssida (språkval) -->
        <div id="introCard" class="intro-card">
            <p id="introText"></p>
            <div class="language-checkboxes" id="langCheckboxes">
                <label class="lang-checkbox">
                    <input type="checkbox" value="sv" checked> <span data-lang-label="sv"></span>
                </label>
                <label class="lang-checkbox">
                    <input type="checkbox" value="fi" checked> <span data-lang-label="fi"></span>
                </label>
                <label class="lang-checkbox">
                    <input type="checkbox" value="en" checked> <span data-lang-label="en"></span>
                </label>
                <label class="lang-checkbox">
                    <input type="checkbox" value="la" checked> <span data-lang-label="la"></span>
                </label>
            </div>
            <button id="startGameBtn" class="primary-btn"></button>
        </div>

        <!-- Frågekort (döljs initialt) -->
        <div id="quizCard" class="question-card hidden">
            <div class="progress" id="progressIndicator"></div>
            <div class="tree-display">
                <span id="treeDisplayName"></span>
                <span id="treeDisplayLanguage"></span>
            </div>
            <div id="treeInputsArea" class="tree-inputs"></div>
            <!-- Feedbackruta skapas dynamiskt -->
            <div class="button-group">
                <button id="treeCheckBtn" class="primary-btn">✅ Kontrollera</button>
                <button id="treeNextBtn" class="primary-btn" disabled>➡️ Nästa</button>
            </div>
        </div>

        <!-- Resultatkort -->
        <div id="resultCard" class="result-card hidden">
            <div class="result-stats" id="resultStats"></div>
            <button id="restartTreeBtn" class="primary-btn">🔄 Öva igen</button>
            <button id="backFromResultBtn" class="secondary-btn">📋 Välj annat test</button>
        </div>
    </main>

    <footer>
        <p>© Mats Lindholm</p>
    </footer>
</div>

<script src="tradslagochbuskar.js"></script>
</body>
</html>
