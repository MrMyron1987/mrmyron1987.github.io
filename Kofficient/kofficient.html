<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkylera koefficienter</title>
    <link rel="stylesheet" href="kofficient.css">
</head>
<body>
<div class="app-container">
    <header class="main-header">
        <h1 id="pageTitle">🧮 Kalkylera koefficienter</h1>
        <button id="backToTestsBtn" class="back-btn">⬅ Tillbaka till testerna</button>
    </header>

    <main class="quiz-area">
        <div id="quizCard" class="question-card">
            <div class="progress" id="progressIndicator"></div>
            
            <div id="questionText" class="question-text"></div>
            
            <div class="answer-inputs">
                <div class="input-group">
                    <label for="perHectareInput" id="perHectareLabel">Plantor per hektar:</label>
                    <input type="number" id="perHectareInput" placeholder="t.ex. 2600" step="1" min="0">
                </div>
                <div class="input-group">
                    <label for="totalInput" id="totalLabel">Totalt i figuren:</label>
                    <input type="number" id="totalInput" placeholder="t.ex. 5720" step="1" min="0">
                </div>
            </div>
            
            <div id="feedbackArea" class="feedback hidden"></div>
            
            <div class="button-group">
                <button id="checkBtn" class="primary-btn">✅ Kontrollera</button>
                <button id="nextBtn" class="primary-btn" disabled>➡️ Nästa</button>
            </div>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="result-stats" id="resultStats"></div>
            <button id="restartBtn" class="primary-btn">🔄 Öva igen</button>
            <button id="backFromResultBtn" class="secondary-btn">📋 Välj annat test</button>
        </div>
    </main>

    <footer>
        <p>© Mats Lindholm</p>
    </footer>
</div>

<script src="kofficient.js"></script>
</body>
</html>
